services:
  - type: web
    name: queuestorm-investigator
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false  # set manually in Render dashboard as a secret
      - key: PORT
        value: 8000
    healthCheckPath: /health
    autoDeploy: true